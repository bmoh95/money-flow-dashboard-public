<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="에어컨 청소 예약 전 확인표">
  <rect width="1200" height="720" fill="#F8FAFC"/>
  <style>text{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;fill:#172033} .muted{fill:#64748b} .box{fill:#fff;stroke:#d9e2ef;stroke-width:3} .blue{fill:#e0f2fe} .green{fill:#e8f5e9} .yellow{fill:#fff7d6}</style>
  
  <text x="90" y="88" font-size="44" font-weight="800">예약 확정 전 확인표</text>
  <rect x="90" y="130" width="1020" height="475" rx="36" class="box"/>
  <g font-size="31">
    <text x="145" y="205">✓ 에어컨 종류: 벽걸이 / 스탠드 / 시스템</text>
    <text x="145" y="270">✓ 실내기 사진과 설치 위치 확인</text>
    <text x="145" y="335">✓ 실외기 작업 포함 여부 구분</text>
    <text x="145" y="400">✓ 주차·엘리베이터·작업 공간 확인</text>
    <text x="145" y="465">✓ 물·전원 사용 가능 여부 확인</text>
    <text x="145" y="530">✓ 일정 변경/취소 기준은 업체 기준에 맞춰 안내</text>
  </g>
  <rect x="90" y="630" width="900" height="44" rx="18" class="yellow"/>
  <text x="120" y="661" font-size="24" class="muted">가격·효과를 단정하지 말고 “확인 후 안내” 흐름으로</text>

</svg>