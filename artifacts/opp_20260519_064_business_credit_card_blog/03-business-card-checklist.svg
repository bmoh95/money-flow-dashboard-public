<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
<rect width="1200" height="675" fill="#f8fafc"/><rect x="48" y="48" width="1104" height="579" rx="34" fill="#eef6ff" stroke="#dbeafe" stroke-width="2"/>
<text x="120" y="110" font-family="Apple SD Gothic Neo, Nanum Gothic, Noto Sans CJK KR, Noto Sans KR, sans-serif" font-size="25" font-weight="800" fill="#2563eb">사업용 신용카드 등록 전 체크</text>
<text x="120" y="151" font-family="Apple SD Gothic Neo, Nanum Gothic, Noto Sans CJK KR, Noto Sans KR, sans-serif" font-size="20" font-weight="600" fill="#64748b">비용 처리 확정이 아니라, 신고 자료를 덜 흩어지게 하는 준비입니다.</text>
<rect x="120" y="170" width="960" height="68" rx="18" fill="#fff" stroke="#dbeafe" stroke-width="2"/><circle cx="158" cy="204" r="16" fill="#14b8a6"/><path d="M150 204 L156 211 L168 197" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="190" y="204" font-family="Apple SD Gothic Neo, Nanum Gothic, Noto Sans CJK KR, Noto Sans KR, sans-serif" font-size="25" font-weight="700" dominant-baseline="central" fill="#172554">카드 명의가 사업자 본인인지</text><rect x="120" y="252" width="960" height="68" rx="18" fill="#fff" stroke="#dbeafe" stroke-width="2"/><circle cx="158" cy="286" r="16" fill="#14b8a6"/><path d="M150 286 L156 293 L168 279" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="190" y="286" font-family="Apple SD Gothic Neo, Nanum Gothic, Noto Sans CJK KR, Noto Sans KR, sans-serif" font-size="25" font-weight="700" dominant-baseline="central" fill="#172554">개인 지출과 섞이지 않는지</text><rect x="120" y="334" width="960" height="68" rx="18" fill="#fff" stroke="#dbeafe" stroke-width="2"/><circle cx="158" cy="368" r="16" fill="#14b8a6"/><path d="M150 368 L156 375 L168 361" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="190" y="368" font-family="Apple SD Gothic Neo, Nanum Gothic, Noto Sans CJK KR, Noto Sans KR, sans-serif" font-size="25" font-weight="700" dominant-baseline="central" fill="#172554">다음 달 조회 시점을 알고 있는지</text><rect x="120" y="416" width="960" height="68" rx="18" fill="#fff" stroke="#dbeafe" stroke-width="2"/><circle cx="158" cy="450" r="16" fill="#14b8a6"/><path d="M150 450 L156 457 L168 443" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="190" y="450" font-family="Apple SD Gothic Neo, Nanum Gothic, Noto Sans CJK KR, Noto Sans KR, sans-serif" font-size="25" font-weight="700" dominant-baseline="central" fill="#172554">신고 전 공제/불공제를 다시 보는지</text><rect x="120" y="498" width="960" height="68" rx="18" fill="#fff" stroke="#dbeafe" stroke-width="2"/><circle cx="158" cy="532" r="16" fill="#14b8a6"/><path d="M150 532 L156 539 L168 525" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="190" y="532" font-family="Apple SD Gothic Neo, Nanum Gothic, Noto Sans CJK KR, Noto Sans KR, sans-serif" font-size="25" font-weight="700" dominant-baseline="central" fill="#172554">세무대리인에게 등록 사실을 알렸는지</text>
<text x="120" y="604" font-family="Apple SD Gothic Neo, Nanum Gothic, Noto Sans CJK KR, Noto Sans KR, sans-serif" font-size="19" fill="#64748b">일반 안내입니다. 사업 형태와 지출 성격에 따라 판단이 달라질 수 있습니다.</text>
</svg>