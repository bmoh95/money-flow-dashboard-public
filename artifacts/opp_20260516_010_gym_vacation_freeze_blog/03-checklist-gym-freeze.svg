    <text x="145" y="530">✓ 문자·카톡·인스타 공지 내용 일치</text>
  </g>
  <rect x="90" y="630" width="760" height="44" rx="18" fill="#eaf3ff"/>
  <text x="120" y="661" font-size="24" class="muted">단정 대신 “센터 기준에 따라 확인” 문구를 남기기</text>

</svg>