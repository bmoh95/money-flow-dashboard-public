<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#f4f0fb"/><text x="80" y="100" font-family="Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="44" font-weight="700" fill="#312a3a">카드내역은 O / X / ? 로 먼저 거르기</text><g font-family="Apple SD Gothic Neo, Noto Sans KR, sans-serif"><rect x="90" y="165" width="300" height="235" rx="28" fill="#ffffff" stroke="#b7d8bf" stroke-width="4"/><text x="215" y="255" font-size="76" font-weight="700" fill="#3b7d4b">O</text><text x="130" y="325" font-size="28" fill="#2f4234">업무 관련이 비교적 명확</text><rect x="450" y="165" width="300" height="235" rx="28" fill="#ffffff" stroke="#f0c3c3" stroke-width="4"/><text x="575" y="255" font-size="76" font-weight="700" fill="#b45151">X</text><text x="505" y="325" font-size="28" fill="#4b3434">개인 지출로 보이는 것</text><rect x="810" y="165" width="300" height="235" rx="28" fill="#ffffff" stroke="#d9c892" stroke-width="4"/><text x="940" y="255" font-size="76" font-weight="700" fill="#9b7b28">?</text><text x="865" y="325" font-size="28" fill="#4d4328">나중에 확인할 항목</text><text x="115" y="485" font-size="32" fill="#322a3a">1. 먼저 지우기  →  2. 애매한 것 모으기  →  3. 근거 파일 붙이기</text><rect x="115" y="525" width="970" height="70" rx="18" fill="#ffffff"/><text x="145" y="570" font-size="28" fill="#50465d">완벽한 분류보다, 자료를 잃어버리지 않는 쪽이 먼저입니다.</text></g></svg>