<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#eef5f8"/><text x="80" y="95" font-family="Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="42" font-weight="700" fill="#26333a">비용은 ‘판정’보다 메모가 먼저</text><rect x="80" y="135" width="1040" height="430" rx="26" fill="#ffffff" stroke="#c8d9df" stroke-width="4"/><g font-family="Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="30" fill="#26333a"><text x="120" y="205" font-weight="700">항목</text><text x="430" y="205" font-weight="700">먼저 적어둘 메모</text><text x="870" y="205" font-weight="700">확인</text><text x="120" y="285">프로그램 구독</text><text x="430" y="285">어떤 작업에 썼는지</text><text x="870" y="285">영수증</text><text x="120" y="360">장비 구입</text><text x="430" y="360">구입일 · 사용 목적</text><text x="870" y="360">거래내역</text><text x="120" y="435">통신비</text><text x="430" y="435">업무용 비율은 나중에 확인</text><text x="870" y="435">애매함</text><text x="120" y="510">미팅/교통</text><text x="430" y="510">누구를 만났는지 한 줄</text><text x="870" y="510">메모</text></g><path d="M100 225h1000M100 305h1000M100 380h1000M100 455h1000M380 155v390M820 155v390" stroke="#dbe8ec" stroke-width="3"/><text x="80" y="625" font-family="Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="26" fill="#65767e">※ 비용 인정 여부는 개인 상황에 따라 달라질 수 있어요.</text></svg>