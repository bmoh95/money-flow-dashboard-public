<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><defs><style>.bg{fill:#fffdf8}.card{fill:#ffffff;stroke:#eadfce;stroke-width:2}.muted{fill:#6b6258;font-family:Apple SD Gothic Neo,Noto Sans KR,sans-serif;font-size:22px}.title{fill:#2b2118;font-family:Apple SD Gothic Neo,Noto Sans KR,sans-serif;font-size:42px;font-weight:700}.small{fill:#4b4036;font-family:Apple SD Gothic Neo,Noto Sans KR,sans-serif;font-size:26px}.accent{fill:#f6c36a}.green{fill:#70b77e}.red{fill:#e8897b}.line{stroke:#eadfce;stroke-width:2}</style></defs><rect class="bg" width="1200" height="675"/><circle class="accent" cx="955" cy="120" r="92" opacity=".55"/><circle class="green" cx="190" cy="545" r="120" opacity=".18"/><rect class="card" x="92" y="92" width="1016" height="491" rx="34"/><text class="muted" x="150" y="180">개인 카페 여름 운영 메모</text><text class="title" x="150" y="270">시즌메뉴 시작 전</text><text class="title" x="150" y="330">미리 써두면 편한 안내문</text><text class="small" x="150" y="430">판매기간 · 품절 · 옵션 · 알레르기 문의</text><text class="small" x="150" y="480">예쁘게보다, 덜 헷갈리게 적는 쪽으로</text></svg>