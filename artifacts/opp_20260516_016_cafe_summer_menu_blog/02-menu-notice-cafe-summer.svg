<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><defs><style>.bg{fill:#fffdf8}.card{fill:#ffffff;stroke:#eadfce;stroke-width:2}.muted{fill:#6b6258;font-family:Apple SD Gothic Neo,Noto Sans KR,sans-serif;font-size:22px}.title{fill:#2b2118;font-family:Apple SD Gothic Neo,Noto Sans KR,sans-serif;font-size:42px;font-weight:700}.small{fill:#4b4036;font-family:Apple SD Gothic Neo,Noto Sans KR,sans-serif;font-size:26px}.accent{fill:#f6c36a}.green{fill:#70b77e}.red{fill:#e8897b}.line{stroke:#eadfce;stroke-width:2}</style></defs><rect class="bg" width="1200" height="675"/><text class="title" x="86" y="90">시즌메뉴 공지 예시</text><rect class="card" x="85" y="130" width="1030" height="455" rx="34"/><rect x="130" y="180" width="720" height="90" rx="24" fill="#f5efe7"/><text class="small" x="165" y="235">오늘 망고빙수는 준비 수량이 많지 않습니다.</text><rect x="130" y="295" width="860" height="112" rx="24" fill="#f5efe7"/><text class="small" x="165" y="348">늦은 오후 방문 예정이면</text><text class="small" x="165" y="385">매장으로 한 번만 확인해주세요.</text><rect x="130" y="438" width="900" height="92" rx="24" fill="#eef7ef"/><text class="small" x="165" y="493">우유 변경은 준비된 옵션에 한해 가능합니다.</text></svg>