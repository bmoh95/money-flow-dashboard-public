<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#f3f1ec"/><text x="78" y="92" font-family="Apple SD Gothic Neo,Noto Sans KR,sans-serif" font-size="42" font-weight="700" fill="#302c28">문자는 짧게, 기준은 빠지지 않게</text><rect x="185" y="135" width="830" height="440" rx="42" fill="#ffffff" stroke="#ddd4c7" stroke-width="4"/><rect x="235" y="195" width="575" height="86" rx="26" fill="#eef4ff"/><text x="265" y="249" font-family="Apple SD Gothic Neo,Noto Sans KR,sans-serif" font-size="30" fill="#27344e">기존 원생 우선으로 먼저 안내드립니다.</text><rect x="235" y="305" width="705" height="98" rx="26" fill="#f8f8f8"/><text x="265" y="352" font-family="Apple SD Gothic Neo,Noto Sans KR,sans-serif" font-size="28" fill="#333">대상/시간표 확인 후 참여를 원하시면</text><text x="265" y="389" font-family="Apple SD Gothic Neo,Noto Sans KR,sans-serif" font-size="28" fill="#333">이번 주 금요일까지 답장 부탁드립니다.</text><rect x="235" y="430" width="620" height="72" rx="24" fill="#fff4d6"/><text x="265" y="476" font-family="Apple SD Gothic Neo,Noto Sans KR,sans-serif" font-size="28" fill="#5c4a20">수강료·보강 기준은 내부 기준 확인 후 안내</text><text x="235" y="630" font-family="Apple SD Gothic Neo,Noto Sans KR,sans-serif" font-size="26" fill="#70675c">※ 실제 발송 전 날짜, 대상, 비용, 보강 기준은 학원 기준에 맞춰 바꾸세요.</text></svg>