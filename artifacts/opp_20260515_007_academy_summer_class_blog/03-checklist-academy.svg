<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#edf7f1"/><text x="78" y="95" font-family="Apple SD Gothic Neo,Noto Sans KR,sans-serif" font-size="44" font-weight="700" fill="#263a2d">특강 안내 전 체크리스트</text><rect x="85" y="135" width="1030" height="455" rx="30" fill="#ffffff" stroke="#c8dfcf" stroke-width="4"/><g font-family="Apple SD Gothic Neo,Noto Sans KR,sans-serif" font-size="32" fill="#263a2d"><text x="145" y="215">□ 기간과 요일이 실제 시간표와 맞나요?</text><text x="145" y="285">□ 대상 학년과 수준이 너무 넓지 않나요?</text><text x="145" y="355">□ 정원/마감 기준을 부드럽게 적었나요?</text><text x="145" y="425">□ 결석·보강 기준을 숨기지 않았나요?</text><text x="145" y="495">□ “성적 보장” 같은 과한 표현은 뺐나요?</text></g><rect x="120" y="535" width="960" height="75" rx="20" fill="#f4fbf6"/><text x="150" y="582" font-family="Apple SD Gothic Neo,Noto Sans KR,sans-serif" font-size="28" fill="#506758">문의를 줄이는 글은 예쁜 홍보문보다 기준이 선명합니다.</text></svg>