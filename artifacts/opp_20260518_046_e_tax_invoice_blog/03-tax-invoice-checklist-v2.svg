<text x="90" y="190" font-size="48" font-weight="800" fill="#111827">발급 전</text><text x="90" y="252" font-size="48" font-weight="800" fill="#111827">체크리스트</text><text x="92" y="330" font-size="25" fill="#475569">공식 안내와 함께 확인하세요.</text><rect x="660" y="258" width="410" height="76" rx="18" fill="#fff" stroke="#dbeafe" stroke-width="2"/><circle cx="700" cy="296" r="16" fill="#7c3aed"/><text x="700" y="302" font-size="16" font-weight="800" text-anchor="middle" fill="#fff">1</text><text x="735" y="304" font-size="25" font-weight="750" fill="#172554">거래처 정보</text><rect x="660" y="358" width="410" height="76" rx="18" fill="#fff" stroke="#dbeafe" stroke-width="2"/><circle cx="700" cy="396" r="16" fill="#7c3aed"/><text x="700" y="402" font-size="16" font-weight="800" text-anchor="middle" fill="#fff">2</text><text x="735" y="404" font-size="25" font-weight="750" fill="#172554">작성일자</text><rect x="660" y="458" width="410" height="76" rx="18" fill="#fff" stroke="#dbeafe" stroke-width="2"/><circle cx="700" cy="496" r="16" fill="#7c3aed"/><text x="700" y="502" font-size="16" font-weight="800" text-anchor="middle" fill="#fff">3</text><text x="735" y="504" font-size="25" font-weight="750" fill="#172554">수정발급 사유</text>
