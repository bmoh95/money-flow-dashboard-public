<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>2026 최저임금 간이 계산기</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;max-width:720px;margin:32px auto;padding:0 18px;line-height:1.75;color:#222}.card{border:1px solid #ddd;border-radius:16px;padding:20px;background:#fffaf0}label{display:block;margin:12px 0 4px;font-weight:700}input{font-size:18px;padding:10px;width:160px}.result{margin-top:20px;padding:16px;border-radius:12px;background:#f3f7ff}.muted{color:#666;font-size:14px}</style></head><body><h1>2026 최저임금 간이 계산기</h1><p>공식 2026년 시급 10,320원을 기준으로 월 예상 인건비를 빠르게 보는 로컬 계산기입니다.</p><div class="card"><label>시급</label><input id="wage" type="number" value="10320"><label>주 근무시간</label><input id="hours" type="number" value="40"><label>월 환산 주 수</label><input id="weeks" type="number" value="4.345"><div class="result" id="out"></div></div><p class="muted">주휴수당, 4대보험, 연장/야간/휴일근로는 사업장 조건에 따라 달라집니다. 법률·노무 자문이 아닙니다.</p><script>function fmt(n){return Math.round(n).toLocaleString('ko-KR')+'원'}function calc(){let w=+wage.value||0,h=+hours.value||0,we=+weeks.value||0;let base=w*h*we;let monthly209=w*209;out.innerHTML='<b>입력 기준 월 단순 환산:</b> '+fmt(base)+'<br><b>주 40시간/월 209시간 기준:</b> '+fmt(monthly209)}document.querySelectorAll('input').forEach(i=>i.addEventListener('input',calc));calc()</script></body></html>
