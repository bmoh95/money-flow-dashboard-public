<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675"><rect width="1200" height="675" fill="#f8fafc"/><rect x="66" y="62" width="1068" height="550" rx="42" fill="#ffffff" stroke="#e2e8f0"/><text x="600" y="145" text-anchor="middle" font-family="Apple SD Gothic Neo, Pretendard, Noto Sans KR, sans-serif" font-size="62" font-weight="900" fill="#111827">시급만 보지 말고 순서대로</text><text x="600" y="205" text-anchor="middle" font-family="Apple SD Gothic Neo, Pretendard, Noto Sans KR, sans-serif" font-size="30" font-weight="650" fill="#64748b">처음 직원 쓸 때는 근무표 → 주급 → 월 환산 순서가 덜 헷갈립니다</text><g transform="translate(105,260)"><circle cx="45" cy="45" r="38" fill="#2563eb"/><text x="45" y="58" text-anchor="middle" font-family="Apple SD Gothic Neo, Pretendard, Noto Sans KR, sans-serif" font-size="36" font-weight="900" fill="#fff">1</text><rect x="0" y="110" width="300" height="170" rx="28" fill="#fff" stroke="#c7d2fe"/><text x="150" y="175" text-anchor="middle" font-family="Apple SD Gothic Neo, Pretendard, Noto Sans KR, sans-serif" font-size="38" font-weight="850" fill="#111827">근무표</text><text x="150" y="225" text-anchor="middle" font-family="Apple SD Gothic Neo, Pretendard, Noto Sans KR, sans-serif" font-size="24" font-weight="600" fill="#475569">하루 시간 × 주 근무일</text></g><path d="M409 443 L475 443" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/><path d="M475 443 l-22 -18 v36 z" fill="#94a3b8"/><g transform="translate(445,260)"><circle cx="45" cy="45" r="38" fill="#2563eb"/><text x="45" y="58" text-anchor="middle" font-family="Apple SD Gothic Neo, Pretendard, Noto Sans KR, sans-serif" font-size="36" font-weight="900" fill="#fff">2</text><rect x="0" y="110" width="300" height="170" rx="28" fill="#fff" stroke="#c7d2fe"/><text x="150" y="175" text-anchor="middle" font-family="Apple SD Gothic Neo, Pretendard, Noto Sans KR, sans-serif" font-size="38" font-weight="850" fill="#111827">주급</text><text x="150" y="225" text-anchor="middle" font-family="Apple SD Gothic Neo, Pretendard, Noto Sans KR, sans-serif" font-size="24" font-weight="600" fill="#475569">주 근무시간 × 시급</text></g><path d="M749 443 L815 443" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/><path d="M815 443 l-22 -18 v36 z" fill="#94a3b8"/><g transform="translate(785,260)"><circle cx="45" cy="45" r="38" fill="#2563eb"/><text x="45" y="58" text-anchor="middle" font-family="Apple SD Gothic Neo, Pretendard, Noto Sans KR, sans-serif" font-size="36" font-weight="900" fill="#fff">3</text><rect x="0" y="110" width="300" height="170" rx="28" fill="#fff" stroke="#c7d2fe"/><text x="150" y="175" text-anchor="middle" font-family="Apple SD Gothic Neo, Pretendard, Noto Sans KR, sans-serif" font-size="38" font-weight="850" fill="#111827">월급</text><text x="150" y="225" text-anchor="middle" font-family="Apple SD Gothic Neo, Pretendard, Noto Sans KR, sans-serif" font-size="24" font-weight="600" fill="#475569">주휴·월 환산 확인</text></g><text x="600" y="590" text-anchor="middle" font-family="Apple SD Gothic Neo, Pretendard, Noto Sans KR, sans-serif" font-size="23" fill="#64748b">주 15시간 이상 여부, 휴게시간, 4대보험은 별도 확인이 필요합니다</text></svg>