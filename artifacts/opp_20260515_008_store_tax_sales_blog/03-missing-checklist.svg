<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#f1f7ef"/><text x="78" y="95" font-family="Apple SD Gothic Neo,Noto Sans KR,sans-serif" font-size="44" font-weight="700" fill="#243827">누락이 자주 나는 항목</text><rect x="85" y="135" width="1030" height="455" rx="30" fill="#ffffff" stroke="#c9ddc2" stroke-width="4"/><g font-family="Apple SD Gothic Neo,Noto Sans KR,sans-serif" font-size="31" fill="#263827"><text x="145" y="215">□ 현금영수증·계좌이체 매출</text><text x="145" y="282">□ 취소/반품 처리된 주문</text><text x="145" y="349">□ 플랫폼 수수료와 광고비</text><text x="145" y="416">□ 배달앱 쿠폰·프로모션 부담금</text><text x="145" y="483">□ 정산 보류분과 입금일 차이</text></g><rect x="120" y="535" width="960" height="75" rx="20" fill="#f6fbf4"/><text x="150" y="582" font-family="Apple SD Gothic Neo,Noto Sans KR,sans-serif" font-size="27" fill="#52694d">애매한 처리는 신고 전 세무 전문가에게 확인하는 게 안전합니다.</text></svg>