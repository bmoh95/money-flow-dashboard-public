<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><rect width="1200" height="675" fill="#eef4f8"/><text x="78" y="92" font-family="Apple SD Gothic Neo,Noto Sans KR,sans-serif" font-size="42" font-weight="700" fill="#26313a">자료는 한곳에 있지 않습니다</text><rect x="86" y="130" width="1028" height="455" rx="30" fill="#fff" stroke="#c8d7e3" stroke-width="4"/><g font-family="Apple SD Gothic Neo,Noto Sans KR,sans-serif" font-size="31" fill="#26313a"><text x="145" y="205">① 홈택스: 카드·현금영수증·전자세금계산서</text><text x="145" y="275">② 판매채널: 스마트스토어·쿠팡 주문/정산</text><text x="145" y="345">③ 배달앱: 주문금액·쿠폰·수수료·정산</text><text x="145" y="415">④ PG/간편결제: 결제일·입금일 차이</text><text x="145" y="485">⑤ 통장: 마지막 대조용 입금 내역</text></g><rect x="120" y="525" width="960" height="70" rx="20" fill="#f7fafc"/><text x="150" y="570" font-family="Apple SD Gothic Neo,Noto Sans KR,sans-serif" font-size="27" fill="#59636b">플랫폼 화면은 바뀔 수 있어 메뉴명보다 자료 종류를 먼저 확인하세요.</text></svg>