<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><defs><style>.bg{fill:#f8fbff}.card{fill:#fff;stroke:#dbe7f2;stroke-width:2}.muted{fill:#65758a;font-family:Apple SD Gothic Neo,Noto Sans KR,sans-serif;font-size:22px}.title{fill:#172033;font-family:Apple SD Gothic Neo,Noto Sans KR,sans-serif;font-size:44px;font-weight:700}.small{fill:#334155;font-family:Apple SD Gothic Neo,Noto Sans KR,sans-serif;font-size:27px}.tiny{fill:#475569;font-family:Apple SD Gothic Neo,Noto Sans KR,sans-serif;font-size:22px}.blue{fill:#b9d9ff}.green{fill:#bfe7d0}.yellow{fill:#ffe2a9}.red{fill:#f7b7b1}.line{stroke:#dbe7f2;stroke-width:2}</style></defs><rect class="bg" width="1200" height="675"/><text class="title" x="86" y="86">휴진 공지 전 체크리스트</text><rect class="card" x="80" y="125" width="1040" height="480" rx="32"/><g class="small"><text x="145" y="205">✓ 휴진 시작일과 진료 재개일</text><text x="145" y="270">✓ 이미 잡힌 예약 변경 안내</text><text x="145" y="335">✓ 네이버플레이스·지도 휴무일</text><text x="145" y="400">✓ 카카오채널·톡톡 자동응답</text><text x="145" y="465">✓ 전화 연결음 또는 부재중 멘트</text><text x="145" y="530">✓ 급한 증상은 공식 기관 확인 안내</text></g><circle class="yellow" cx="1005" cy="178" r="52" opacity=".45"/><circle class="red" cx="1005" cy="515" r="72" opacity=".25"/></svg>