<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><defs><style>.bg{fill:#f8fbff}.card{fill:#fff;stroke:#dbe7f2;stroke-width:2}.muted{fill:#65758a;font-family:Apple SD Gothic Neo,Noto Sans KR,sans-serif;font-size:22px}.title{fill:#172033;font-family:Apple SD Gothic Neo,Noto Sans KR,sans-serif;font-size:44px;font-weight:700}.small{fill:#334155;font-family:Apple SD Gothic Neo,Noto Sans KR,sans-serif;font-size:27px}.tiny{fill:#475569;font-family:Apple SD Gothic Neo,Noto Sans KR,sans-serif;font-size:22px}.blue{fill:#b9d9ff}.green{fill:#bfe7d0}.yellow{fill:#ffe2a9}.red{fill:#f7b7b1}.line{stroke:#dbe7f2;stroke-width:2}</style></defs><rect class="bg" width="1200" height="675"/><text class="title" x="84" y="90">예약 변경 문자 예시</text><rect class="card" x="85" y="130" width="1030" height="455" rx="34"/><rect x="135" y="185" width="830" height="94" rx="24" fill="#eef6ff"/><text class="small" x="168" y="243">안녕하세요, ○○의원입니다.</text><rect x="135" y="305" width="900" height="116" rx="24" fill="#eef6ff"/><text class="small" x="168" y="356">여름휴가 휴진 일정으로</text><text class="small" x="168" y="394">예약 시간 조정이 필요해 연락드립니다.</text><rect x="135" y="450" width="880" height="82" rx="24" fill="#f4f8ef"/><text class="small" x="168" y="502">가능한 날짜나 시간대를 답장으로 남겨주세요.</text></svg>