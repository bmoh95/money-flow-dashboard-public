<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><defs><style>.bg{fill:#f8fbff}.card{fill:#fff;stroke:#dbe7f2;stroke-width:2}.muted{fill:#65758a;font-family:Apple SD Gothic Neo,Noto Sans KR,sans-serif;font-size:22px}.title{fill:#172033;font-family:Apple SD Gothic Neo,Noto Sans KR,sans-serif;font-size:44px;font-weight:700}.small{fill:#334155;font-family:Apple SD Gothic Neo,Noto Sans KR,sans-serif;font-size:27px}.tiny{fill:#475569;font-family:Apple SD Gothic Neo,Noto Sans KR,sans-serif;font-size:22px}.blue{fill:#b9d9ff}.green{fill:#bfe7d0}.yellow{fill:#ffe2a9}.red{fill:#f7b7b1}.line{stroke:#dbe7f2;stroke-width:2}</style></defs><rect class="bg" width="1200" height="675"/><circle class="blue" cx="970" cy="120" r="95" opacity=".58"/><circle class="green" cx="180" cy="535" r="115" opacity=".22"/><rect class="card" x="92" y="86" width="1016" height="500" rx="34"/><text class="muted" x="150" y="175">동네 치과·의원 여름휴가 전</text><text class="title" x="150" y="270">휴진 안내문은</text><text class="title" x="150" y="335">날짜만 쓰면 부족합니다</text><text class="small" x="150" y="435">예약 변경 · 진료 재개일 · 문의 채널</text><text class="small" x="150" y="485">헛걸음 줄이는 문구 체크</text><rect x="850" y="265" width="145" height="145" rx="26" fill="#eef6ff" stroke="#dbe7f2"/><text class="small" x="885" y="348">休</text></svg>