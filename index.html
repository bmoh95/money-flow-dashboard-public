    const tagText = i => tags(i).map(x=>x.text);
    const tagHtml = (i, max=99) => tags(i).slice(0,max).map(x=>`<span class="${esc(x.cls)}">${esc(x.text)}</span>`).join('');
    function render(data){currentData=data; document.getElementById('updatedAt').textContent=data.updated_at||'-'; const items=data.work_items||[], m=data.metrics||{}; document.getElementById('summaryCards').innerHTML=[['총 일감',items.length||m.total||0],['진행 중',m.active||0],['승인 대기',m.approval_needed||0],['예상 순익',fmtWon((data.roi||{}).expected_base_net_total)],['폐기',m.rejected||0]].map(([k,v])=>`<div class="metric"><span>${k}</span><b>${v}</b></div>`).join(''); const q=(document.getElementById('q').value||'').toLowerCase(); const filtered=items.filter(i=>[i.key,i.title,i.buyer_or_payer,i.channel,i.status,...tagText(i)].join(' ').toLowerCase().includes(q)); const cols=data.board_columns||currentData.board_columns; document.getElementById('board').innerHTML=cols.map(col=>{const xs=filtered.filter(i=>i.column===col); return `<div class="column"><div class="colhead"><b>${col}</b><span>${xs.length}</span></div><div class="cards">${xs.map(card).join('')||'<div class="empty">일감 없음</div>'}</div></div>`}).join(''); document.getElementById('events').innerHTML=(data.recent_events||[]).filter(e=>e.event!=='dashboard_updated').slice(-8).reverse().map(e=>`<div class="event"><span class="pill">${esc(label(ownerKo,e.agent)||'작업')}</span><b>${esc(e.decision||e.event)}</b><p>${esc(e.summary||'')}</p><small>${esc(e.opportunity_id||'')}</small></div>`).join(''); document.getElementById('roi').innerHTML=`<div class="roirow"><span>예상 기준 순익</span><b>${fmtWon((data.roi||{}).expected_base_net_total)}</b></div><div class="roirow"><span>실제 수익</span><b>${fmtWon((data.roi||{}).actual_revenue_total)}</b></div><div class="roirow"><span>실제 순익</span><b>${fmtWon((data.roi||{}).actual_net_total)}</b></div>`; document.getElementById('nextActions').innerHTML='<h3>다음 액션</h3>'+(items.filter(i=>i.next_action).map(i=>`<div class="next"><b>${esc(i.key)}</b> ${esc(i.next_action)}</div>`).join('')||'<p class="muted">없음</p>');}
    function card(i){const t=tagHtml(i,4); return `<button class="issue ${priorityClass(i.priority)}" data-id="${esc(i.id)}"><div class="issueTop"><span class="key">${esc(i.key)}</span><span class="status">${esc(label(statusKo,i.status))}</span></div><h3>${esc(i.title)}</h3><div class="badges">${t}</div><div class="mini"><span>품질 ${esc(i.quality??'-')}</span><span>${fmtWon(i.base_net)}</span></div></button>`;}
    function openModal(id){const i=(currentData.work_items||[]).find(x=>x.id===id); if(!i)return; const risks=(i.risk_flags||[]).map(r=>`<li>${esc(r)}</li>`).join('')||'<li>없음</li>'; const evidence=(i.evidence||[]).map(e=>`<li><b>${esc(e.grade||'?')}</b> ${esc(e.summary||'')}<br><small>${esc(e.url||'')}</small></li>`).join('')||'<li>없음</li>'; const decisions=(i.decision_history||[]).map(d=>`<li><b>${esc(label(ownerKo,d.agent))}</b> · ${esc(d.decision)}<p>${esc(d.summary||'')}</p></li>`).join('')||'<li>없음</li>'; const assetItems=(i.asset_links&&i.asset_links.length?i.asset_links:(i.assets||[]).map(a=>({name:a.split('/').slice(-1)[0],source:a}))); const assets=assetItems.map(a=>{const display=a.title||a.label||a.name||String(a.source||''); return a.viewer?`<li><button class="assetLink" data-viewer="${esc(a.viewer)}" data-name="${esc(display)}" data-file="${esc(a.name||String(a.source||''))}">${esc(display)}</button></li>`:`<li><code>${esc(display)}</code></li>`}).join('')||'<li>없음</li>'; const modalTags=tagHtml(i); document.getElementById('modalBody').innerHTML=`<div class="modalHead"><span class="key">${esc(i.key)}</span><span class="prio ${priorityClass(i.priority)}">${esc(label(priorityKo,i.priority))}</span></div><h2 id="modalTitle">${esc(i.title)}</h2><div class="badges big">${modalTags}</div><div class="detailGrid"><div><small>상태</small><b>${esc(label(statusKo,i.status))}</b></div><div><small>구매자</small><b>${esc(i.buyer_or_payer||'-')}</b></div><div><small>채널</small><b>${esc(i.channel||'-')}</b></div><div><small>담당 단계</small><b>${esc(label(ownerKo,i.current_owner)||'-')}</b></div><div><small>품질</small><b>${esc(i.quality??'-')}</b></div><div><small>예상 순익</small><b>${fmtWon(i.base_net)}</b></div><div><small>마진</small><b>${esc(i.margin_pct??'-')}%</b></div><div><small>판매가</small><b>${fmtWon(i.expected_price)}</b></div></div><section><h3>다음 액션</h3><p class="action">${esc(i.next_action||'없음')}</p></section><section><h3>리스크</h3><ul>${risks}</ul></section><section><h3>근거</h3><ul>${evidence}</ul></section><section><h3>판단 이력</h3><ul>${decisions}</ul></section><section><h3>산출물 ${(i.asset_links||i.assets||[]).length}개</h3><ul class="assets">${assets}</ul></section>`; document.getElementById('modal').classList.add('open'); document.getElementById('modal').setAttribute('aria-hidden','false');}
    
    function mdRender(src){let s=esc(src);s=s.replace(/```([\s\S]*?)```/g,(m,c)=>'<pre><code>'+c+'</code></pre>');s=s.replace(/^###### (.*)$/gm,'<h6>$1</h6>').replace(/^##### (.*)$/gm,'<h5>$1</h5>').replace(/^#### (.*)$/gm,'<h4>$1</h4>').replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^## (.*)$/gm,'<h2>$1</h2>').replace(/^# (.*)$/gm,'<h1>$1</h1>');s=s.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');s=s.replace(/^> (.*)$/gm,'<blockquote>$1</blockquote>');s=s.replace(/^(?:- |\* )(.*(?:\n(?:- |\* ).*)*)/gm,block=>'<ul>'+block.split(/\n/).map(l=>'<li>'+l.replace(/^(?:- |\* )/,'')+'</li>').join('')+'</ul>');s=s.split(/\n{2,}/).map(block=>/^<(h\d|ul|pre|blockquote|table|hr)/.test(block)?block:'<p>'+block.replace(/\n/g,'<br>')+'</p>').join('\n');return s;}
    function openMarkdown(viewer,name,fileName){const m=document.getElementById('mdModal'), body=document.getElementById('mdBody'), title=document.getElementById('mdTitle'); const file=new URL(viewer, location.href).searchParams.get('file')||viewer; const fallback=file.split('/').pop(); const raw=fileName||fallback; title.innerHTML=esc(name||'산출물') + (raw && raw!==name ? '<small class="mdFileName">'+esc(raw)+'</small>' : ''); body.innerHTML='불러오는 중...'; m.classList.add('open'); m.setAttribute('aria-hidden','false'); fetch(file,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(r.status);return r.text()}).then(t=>body.innerHTML=mdRender(t)).catch(e=>body.innerHTML='<p class="err">파일을 불러오지 못했습니다: '+esc(e.message)+'</p>');}
    function closeMarkdown(){document.getElementById('mdModal').classList.remove('open');document.getElementById('mdModal').setAttribute('aria-hidden','true');}
    function closeModal(){document.getElementById('modal').classList.remove('open');document.getElementById('modal').setAttribute('aria-hidden','true');}
    document.getElementById('q').addEventListener('input',()=>render(currentData)); document.addEventListener('click',e=>{const asset=e.target.closest('.assetLink'); if(asset){e.preventDefault(); openMarkdown(asset.dataset.viewer, asset.dataset.name, asset.dataset.file); return;} const issue=e.target.closest('.issue'); if(issue) openModal(issue.dataset.id); if(e.target.dataset.close) closeModal(); if(e.target.dataset.mdClose) closeMarkdown();}); document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeMarkdown();closeModal();}}); fetch('data.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{render(d); if(new URLSearchParams(location.search).get('open')==='first') setTimeout(()=>document.querySelector('.issue')?.click(),100);}).catch(()=>render(EMBEDDED_DATA||currentData));
  </script>
</body>
</html>
