<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Money Flow Work Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><span class="logo">MF</span><div><b>Money Flow</b><small>Jira-style Board</small></div></div>
      <nav><a class="active">보드</a><a>승인 대기</a><a>ROI</a><a>폐기 사유</a></nav>
      <div class="sidebox"><span>외부 공개</span><b>임시 링크</b><small>터널 재시작 시 URL 변경</small></div>
    </aside>
    <main>
      <header class="topbar"><div><p class="eyebrow">합법 수익화 파이프라인</p><h1>일감 보드</h1><p class="muted">목록은 짧게, 상세는 카드를 눌러 팝업에서 확인합니다.</p></div><div class="updated">Updated<br><b id="updatedAt"></b></div></header>
      <section class="summary" id="summaryCards"></section>
      <section class="toolbar"><div class="search">🔎 <input id="q" placeholder="제목/태그/상태/채널 검색" /></div><div class="legend"><span class="dot high"></span>높음 <span class="dot med"></span>보통 <span class="dot low"></span>낮음</div></section>
      <section class="board" id="board"></section>
      <section class="lower"><div class="panel"><h2>최근 판단 로그</h2><div id="events"></div></div><div class="panel"><h2>ROI / 다음 액션</h2><div id="roi"></div><div id="nextActions"></div></div></section>
    </main>
  </div>
  <div class="modal" id="modal" aria-hidden="true"><div class="shade" data-close="1"></div><section class="dialog" role="dialog" aria-modal="true" aria-labelledby="modalTitle"><button class="close" data-close="1" aria-label="닫기">×</button><div id="modalBody"></div></section></div>
  <div class="modal" id="mdModal" aria-hidden="true"><div class="shade" data-md-close="1"></div><section class="dialog mdDialog" role="dialog" aria-modal="true" aria-labelledby="mdTitle"><button class="close" data-md-close="1" aria-label="닫기">×</button><h2 id="mdTitle">산출물</h2><article id="mdBody" class="mdBody">불러오는 중...</article></section></div>
  <script>
    let currentData = {work_items:[], metrics:{}, roi:{}, board_columns:['백로그','리서치','기획','제작','검증 보류','승인 대기','운영/수익','종료/폐기'], recent_events:[]};
    const fmtWon = n => (n ?? 0).toLocaleString('ko-KR') + '원';
    const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const statusKo = {ready_for_approval:'승인 대기', planning_rejected:'기획 반려', research_rejected:'리서치 반려', execution:'제작 중', planning:'기획 중', discovered:'발견', launched:'출시', tracking:'운영', closed_lost:'종료', closed_won:'수익 발생', redteam_hold:'검증 보류'};
    const typeKo = {digital_product:'디지털 상품', bounty:'개발 보상금', writing:'유료 원고', contest:'공모전', resale:'리셀', service:'서비스', other:'기타'};
    const ownerKo = {research_member:'리서치 수집', research_lead:'시장성 검토', planning_member:'기획 작성', planning_lead:'기획 검수', execution_member:'제작', execution_lead:'제작 검수', redteam:'리스크 검토', roi:'수익성 검토', ledger_dashboard_manager:'대시보드 관리'};
    const priorityKo = {HIGH:'높음', MED:'보통', LOW:'낮음'};
    const reasonKo = {WEAK_DIFFERENTIATION:'차별성 약함', NO_APPROVAL:'승인 필요', NO_EVIDENCE:'근거 부족', LOW_MARGIN:'마진 낮음', HIGH_RISK:'위험 높음', NO_BUYER:'구매자 불명확', NO_CHANNEL:'채널 불명확', PAYMENT_UNCLEAR:'정산 불명확', LOW_QUALITY:'품질 부족'};
    const label = (map, v) => (v == null ? '' : (map[v] || v));
    const priorityClass = p => p === 'HIGH' ? 'high' : p === 'LOW' ? 'low' : 'med';
    const tags = i => [
      {text:label(statusKo,i.status), cls:'status'},
      {text:label(typeKo,i.type), cls:'type'},
      {text:label(priorityKo,i.priority), cls:'priority '+priorityClass(i.priority)},
      {text:label(reasonKo,i.stop_reason_code), cls:'reason'}
    ].filter(x=>x.text);
    const tagText = i => tags(i).map(x=>x.text);
    const tagHtml = (i, max=99) => tags(i).slice(0,max).map(x=>`<span class="${esc(x.cls)}">${esc(x.text)}</span>`).join('');
    function render(data){currentData=data; document.getElementById('updatedAt').textContent=data.updated_at||'-'; const items=data.work_items||[], m=data.metrics||{}; document.getElementById('summaryCards').innerHTML=[['총 일감',items.length||m.total||0],['진행 중',m.active||0],['승인 대기',m.approval_needed||0],['예상 순익',fmtWon((data.roi||{}).expected_base_net_total)],['폐기',m.rejected||0]].map(([k,v])=>`<div class="metric"><span>${k}</span><b>${v}</b></div>`).join(''); const q=(document.getElementById('q').value||'').toLowerCase(); const filtered=items.filter(i=>[i.key,i.title,i.buyer,i.channel,i.status,...tagText(i)].join(' ').toLowerCase().includes(q)); const cols=data.board_columns||currentData.board_columns; document.getElementById('board').innerHTML=cols.map(col=>{const xs=filtered.filter(i=>i.column===col); return `<div class="column"><div class="colhead"><b>${col}</b><span>${xs.length}</span></div><div class="cards">${xs.map(card).join('')||'<div class="empty">일감 없음</div>'}</div></div>`}).join(''); document.getElementById('events').innerHTML=(data.recent_events||[]).filter(e=>e.event!=='dashboard_updated').slice(-8).reverse().map(e=>`<div class="event"><span class="pill">${esc(label(ownerKo,e.agent)||'작업')}</span><b>${esc(e.decision||e.event)}</b><p>${esc(e.summary||'')}</p><small>${esc(e.opportunity_id||'')}</small></div>`).join(''); document.getElementById('roi').innerHTML=`<div class="roirow"><span>예상 기준 순익</span><b>${fmtWon((data.roi||{}).expected_base_net_total)}</b></div><div class="roirow"><span>실제 수익</span><b>${fmtWon((data.roi||{}).actual_revenue_total)}</b></div><div class="roirow"><span>실제 순익</span><b>${fmtWon((data.roi||{}).actual_net_total)}</b></div>`; document.getElementById('nextActions').innerHTML='<h3>다음 액션</h3>'+(items.filter(i=>i.next_action).map(i=>`<div class="next"><b>${esc(i.key)}</b> ${esc(i.next_action)}</div>`).join('')||'<p class="muted">없음</p>');}
    function card(i){const t=tagHtml(i,4); return `<button class="issue ${priorityClass(i.priority)}" data-id="${esc(i.id)}"><div class="issueTop"><span class="key">${esc(i.key)}</span><span class="status">${esc(label(statusKo,i.status))}</span></div><h3>${esc(i.title)}</h3><div class="badges">${t}</div><div class="mini"><span>품질 ${esc(i.quality??'-')}</span><span>${fmtWon(i.base_net)}</span></div></button>`;}
    function openModal(id){const i=(currentData.work_items||[]).find(x=>x.id===id); if(!i)return; const risks=(i.risk_flags||[]).map(r=>`<li>${esc(r)}</li>`).join('')||'<li>없음</li>'; const evidence=(i.evidence||[]).map(e=>`<li><b>${esc(e.grade||'?')}</b> ${esc(e.summary||'')}<br><small>${esc(e.url||'')}</small></li>`).join('')||'<li>없음</li>'; const decisions=(i.decision_history||[]).map(d=>`<li><b>${esc(label(ownerKo,d.agent))}</b> · ${esc(d.decision)}<p>${esc(d.summary||'')}</p></li>`).join('')||'<li>없음</li>'; const assetItems=(i.asset_links&&i.asset_links.length?i.asset_links:(i.assets||[]).map(a=>({name:a.split('/').slice(-1)[0],source:a}))); const assets=assetItems.map(a=>{const display=a.title||a.label||a.name||String(a.source||''); return a.viewer?`<li><button class="assetLink" data-viewer="${esc(a.viewer)}" data-name="${esc(display)}">${esc(display)}</button></li>`:`<li><code>${esc(display)}</code></li>`}).join('')||'<li>없음</li>'; const modalTags=tagHtml(i); document.getElementById('modalBody').innerHTML=`<div class="modalHead"><span class="key">${esc(i.key)}</span><span class="prio ${priorityClass(i.priority)}">${esc(label(priorityKo,i.priority))}</span></div><h2 id="modalTitle">${esc(i.title)}</h2><div class="badges big">${modalTags}</div><div class="detailGrid"><div><small>상태</small><b>${esc(label(statusKo,i.status))}</b></div><div><small>구매자</small><b>${esc(i.buyer||'-')}</b></div><div><small>채널</small><b>${esc(i.channel||'-')}</b></div><div><small>담당 단계</small><b>${esc(label(ownerKo,i.owner)||'-')}</b></div><div><small>품질</small><b>${esc(i.quality??'-')}</b></div><div><small>예상 순익</small><b>${fmtWon(i.base_net)}</b></div><div><small>마진</small><b>${esc(i.margin_pct??'-')}%</b></div><div><small>판매가</small><b>${fmtWon(i.expected_price)}</b></div></div><section><h3>다음 액션</h3><p class="action">${esc(i.next_action||'없음')}</p></section><section><h3>리스크</h3><ul>${risks}</ul></section><section><h3>근거</h3><ul>${evidence}</ul></section><section><h3>판단 이력</h3><ul>${decisions}</ul></section><section><h3>산출물 ${(i.asset_links||i.assets||[]).length}개</h3><ul class="assets">${assets}</ul></section>`; document.getElementById('modal').classList.add('open'); document.getElementById('modal').setAttribute('aria-hidden','false');}
    
    function mdRender(src){let s=esc(src);s=s.replace(/```([\s\S]*?)```/g,(m,c)=>'<pre><code>'+c+'</code></pre>');s=s.replace(/^###### (.*)$/gm,'<h6>$1</h6>').replace(/^##### (.*)$/gm,'<h5>$1</h5>').replace(/^#### (.*)$/gm,'<h4>$1</h4>').replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^## (.*)$/gm,'<h2>$1</h2>').replace(/^# (.*)$/gm,'<h1>$1</h1>');s=s.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');s=s.replace(/^> (.*)$/gm,'<blockquote>$1</blockquote>');s=s.replace(/^(?:- |\* )(.*(?:\n(?:- |\* ).*)*)/gm,block=>'<ul>'+block.split(/\n/).map(l=>'<li>'+l.replace(/^(?:- |\* )/,'')+'</li>').join('')+'</ul>');s=s.split(/\n{2,}/).map(block=>/^<(h\d|ul|pre|blockquote|table|hr)/.test(block)?block:'<p>'+block.replace(/\n/g,'<br>')+'</p>').join('\n');return s;}
    function openMarkdown(viewer,name){const m=document.getElementById('mdModal'), body=document.getElementById('mdBody'), title=document.getElementById('mdTitle'); title.textContent=name||'산출물'; body.innerHTML='불러오는 중...'; m.classList.add('open'); m.setAttribute('aria-hidden','false'); const file=new URL(viewer, location.href).searchParams.get('file')||viewer; fetch(file,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(r.status);return r.text()}).then(t=>body.innerHTML=mdRender(t)).catch(e=>body.innerHTML='<p class="err">파일을 불러오지 못했습니다: '+esc(e.message)+'</p>');}
    function closeMarkdown(){document.getElementById('mdModal').classList.remove('open');document.getElementById('mdModal').setAttribute('aria-hidden','true');}
    function closeModal(){document.getElementById('modal').classList.remove('open');document.getElementById('modal').setAttribute('aria-hidden','true');}
    document.getElementById('q').addEventListener('input',()=>render(currentData)); document.addEventListener('click',e=>{const asset=e.target.closest('.assetLink'); if(asset){e.preventDefault(); openMarkdown(asset.dataset.viewer, asset.dataset.name); return;} const issue=e.target.closest('.issue'); if(issue) openModal(issue.dataset.id); if(e.target.dataset.close) closeModal(); if(e.target.dataset.mdClose) closeMarkdown();}); document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeMarkdown();closeModal();}}); fetch('data.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{render(d); if(new URLSearchParams(location.search).get('open')==='first') setTimeout(()=>document.querySelector('.issue')?.click(),100);}).catch(()=>render(currentData));
  </script>
</body>
</html>
