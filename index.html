<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Money Flow Dashboard</title><style>
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;margin:0;background:#f6f7fb;color:#172033}header{padding:22px 24px;background:#111827;color:white}main{padding:18px}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}.card{background:white;border-radius:14px;padding:14px;box-shadow:0 1px 4px #0001}.num{font-size:26px;font-weight:800}.board{display:flex;gap:14px;overflow-x:auto;padding:16px 0}.col{min-width:260px;max-width:300px;background:#e9edf5;border-radius:16px;padding:10px}.col h2{font-size:15px;margin:4px 6px 10px}.issue{display:block;width:100%;text-align:left;background:white;border:0;border-radius:12px;margin:8px 0;padding:12px;box-shadow:0 1px 3px #0002;cursor:pointer}.issue b{font-size:12px;color:#536173}.issue .title{font-weight:750;margin:7px 0;line-height:1.35}.badge{display:inline-block;font-size:11px;background:#eef2ff;color:#3730a3;padding:3px 7px;border-radius:999px;margin:2px;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:12px;color:#64748b}.section{background:white;border-radius:16px;padding:16px;margin-top:14px;box-shadow:0 1px 4px #0001}.log{font-size:13px;border-top:1px solid #e5e7eb;padding:8px 0;overflow-wrap:anywhere}.modal{position:fixed;inset:0;background:#0008;display:none;align-items:center;justify-content:center;padding:18px}.modal.on{display:flex}.modal-box{background:white;border-radius:18px;max-width:760px;max-height:86vh;overflow:auto;padding:22px}.close{float:right;border:0;background:#111827;color:white;border-radius:10px;padding:8px 10px}@media(max-width:700px){.board{display:block;overflow:visible}.col{min-width:0;max-width:none;margin-bottom:14px}}</style></head><body><header><h1>Money Flow 작업 보드</h1><div id="updated"></div></header><main><div class="cards" id="cards"></div><div class="board" id="board"></div><div class="section"><h2>최근 결정</h2><div id="recent"></div></div></main><div class="modal" id="modal"><div class="modal-box"><button class="close" onclick="modal.classList.remove('on')">닫기</button><div id="detail"></div></div></div><script>
async function load(){let d=await fetch('data.json?ts='+Date.now(),{cache:'no-store'}).then(r=>r.json());window.D=d;updated.textContent='갱신 '+d.updated_at;cards.innerHTML=Object.entries({총후보:d.metrics.total,진행중:d.metrics.active,승인대기:d.metrics.approval_needed,출시제출:d.metrics.launched,폐기:d.metrics.rejected}).map(([k,v])=>`<div class="card"><div>${k}</div><div class="num">${v}</div></div>`).join('');board.innerHTML=d.board_columns.map(c=>`<section class="col"><h2>${c}</h2>${d.work_items.filter(i=>i.column==c).slice(-18).reverse().map(i=>`<button class="issue" onclick="openItem('${i.id}')"><b>${i.key} · ${i.status}</b><div class="title">${esc(i.title||'')}</div><div>${(i.tags||[]).slice(0,3).map(t=>`<span class="badge">${esc(t)}</span>`).join('')}</div><div class="meta">품질 ${i.quality??'-'} · 기준 ${i.expected_base_net??0}</div></button>`).join('')}</section>`).join('');recent.innerHTML=(d.recent_events||[]).map(e=>`<div class="log"><b>${esc(e.agent||'')}</b> ${esc(e.decision||e.event||'')} · ${esc(e.opportunity_id||'')}<br>${esc(e.summary||'')}</div>`).join('')}
function esc(s){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function openItem(id){let i=D.work_items.find(x=>x.id==id);detail.innerHTML=`<h2>${esc(i.title)}</h2><p><b>${i.key}</b> · ${i.status} · ${i.type}</p><h3>다음 행동</h3><p>${esc(i.next_action||'')}</p><h3>구매자/채널</h3><p>${esc(i.buyer_or_payer||'')}<br>${esc(i.channel||'')}</p><h3>위험</h3><p>${(i.risk_flags||[]).map(esc).join(', ')}</p><h3>근거</h3>${(i.evidence||[]).map(e=>`<p>[${esc(e.grade||'')}] ${esc(e.summary||'')}<br><small>${esc(e.url||'')}</small></p>`).join('')}<h3>자산</h3>${(i.assets||[]).map(a=>`<p>${esc(typeof a==='string'?a:(a.path||a.url||a.name||JSON.stringify(a)))}</p>`).join('')}`;modal.classList.add('on')}
load();</script></body></html>
