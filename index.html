function drawBoard(){
  const items=filteredItems();
  board.innerHTML=(D.board_columns||[]).map(c=>{const col=items.filter(i=>i.column===c); return `<section class="col" data-col="${esc(c)}"><h2><span>${esc(c)}</span><span class="count">${col.length}</span></h2>${col.length?col.slice(-24).reverse().map(i=>`<button class="issue" data-id="${esc(i.id)}" onclick="openItem('${esc(i.id)}')"><b>${esc(i.key)} · ${esc(i.status)}</b><div class="title">${esc(i.title||'')}</div><div class="badges">${badges(i)}</div><div class="meta">품질 ${i.quality??'-'} · 기준 ${i.expected_base_net??0}</div></button>`).join(''):'<div class="empty">항목 없음</div>'}</section>`}).join('');
  nextActions.innerHTML=(items.filter(i=>i.next_action&&['redteam_hold','ready_for_approval','execution','planning','tracking'].includes(i.raw_status)).slice(-8).reverse().map(i=>`<div class="log"><b>${esc(i.key)} · ${esc(i.status)}</b><br>${esc(i.next_action)}</div>`).join('')||'<div class="empty">표시할 다음 행동 없음</div>');
  recent.innerHTML=(D.recent_events||[]).slice().reverse().slice(0,20).map(e=>`<div class="log"><b>${esc(e.agent||'')}</b> ${esc(e.decision||e.event||'')} · ${esc(e.opportunity_id||'')}<br>${esc(e.summary||'')}</div>`).join('')||'<div class="empty">최근 결정 없음</div>';
}
function assetTitle(a){if(typeof a==='string') return a.split('/').pop(); return a.title||a.name||a.path||a.url||'자산'}
function assetHref(a){if(typeof a==='string') return a; return a.viewer||a.url||a.path||'#'}
function openItem(id){const i=(D.work_items||[]).find(x=>x.id===id); if(!i) return; const riskList=(i.risk_labels&&i.risk_labels.length?i.risk_labels:(i.risk_flags||[]).map(label)); detail.innerHTML=`<h2 id="modalTitle">${esc(i.title)}</h2><p class="muted"><b>${esc(i.key)}</b> · ${esc(i.status)} · ${esc(i.type)}</p><div class="kv"><b>담당/단계</b><div>${esc(i.owner||'')}</div><b>품질/기준 순익</b><div>${i.quality??'-'} / ${i.expected_base_net??0}</div><b>구매자/독자</b><div>${esc(i.buyer_or_payer||'')}</div><b>채널</b><div>${esc(i.channel||'')}</div><b>다음 행동</b><div>${esc(i.next_action||'')}</div><b>리스크/태그</b><div>${riskList.map(x=>`<span class="badge">${esc(x)}</span>`).join('')}</div></div><h3>근거</h3>${(i.evidence||[]).map(e=>`<p><b>${esc(e.grade||'')}</b> ${esc(e.summary||'')}<br><small>${esc(e.url||'')}</small></p>`).join('')||'<p class="muted">근거 없음</p>'}<h3>자산</h3><div class="asset-list">${(i.assets||[]).map(a=>`<a href="${esc(assetHref(a))}" target="_blank" rel="noopener">${esc(assetTitle(a))}</a>`).join('')||'<span class="muted">자산 없음</span>'}</div>`; modal.classList.add('on'); closeBtn.focus();}
closeBtn.onclick=()=>modal.classList.remove('on'); modal.addEventListener('click',e=>{if(e.target===modal) modal.classList.remove('on')}); document.addEventListener('keydown',e=>{if(e.key==='Escape') modal.classList.remove('on')}); q.oninput=drawBoard; statusFilter.onchange=drawBoard;
loadData().then(d=>{D=d; render();});
</script>
</body>
</html>
