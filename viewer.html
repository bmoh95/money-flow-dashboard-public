<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Markdown Viewer</title><style>
body{margin:0;background:#f4f5f7;color:#172b4d;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif}.wrap{max-width:920px;margin:28px auto;background:#fff;border:1px solid #dfe1e6;border-radius:14px;box-shadow:0 1px 2px #091e4240,0 8px 24px #091e4214;padding:30px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;border-bottom:1px solid #dfe1e6;padding-bottom:14px;margin-bottom:22px}.file{color:#6b778c;font-size:13px}a{color:#0052cc}h1,h2,h3{color:#172b4d;line-height:1.25}h1{font-size:30px;border-bottom:1px solid #dfe1e6;padding-bottom:10px}h2{font-size:23px;margin-top:30px}h3{font-size:18px;margin-top:24px}p,li{line-height:1.7}code{background:#f4f5f7;border-radius:5px;padding:2px 5px}pre{background:#0b1020;color:#e8ecf8;border-radius:10px;padding:14px;overflow:auto}blockquote{border-left:4px solid #0052cc;background:#deebff55;margin:16px 0;padding:8px 14px}table{border-collapse:collapse;width:100%;margin:16px 0}td,th{border:1px solid #dfe1e6;padding:8px;text-align:left}th{background:#f4f5f7}hr{border:0;border-top:1px solid #dfe1e6;margin:24px 0}.err{color:#de350b}
</style></head><body><main class="wrap"><div class="top"><div><b>산출물 Markdown Viewer</b><div class="file" id="file"></div></div><a href="./" target="_self">보드로 돌아가기</a></div><article id="content">불러오는 중...</article></main><script>
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function md(src){let s=esc(src);s=s.replace(/```([\s\S]*?)```/g,(m,c)=>'<pre><code>'+c+'</code></pre>');s=s.replace(/^###### (.*)$/gm,'<h6>$1</h6>').replace(/^##### (.*)$/gm,'<h5>$1</h5>').replace(/^#### (.*)$/gm,'<h4>$1</h4>').replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^## (.*)$/gm,'<h2>$1</h2>').replace(/^# (.*)$/gm,'<h1>$1</h1>');s=s.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');s=s.replace(/^> (.*)$/gm,'<blockquote>$1</blockquote>');s=s.replace(/^(?:- |\* )(.*(?:\n(?:- |\* ).*)*)/gm,block=>'<ul>'+block.split(/\n/).map(l=>'<li>'+l.replace(/^(?:- |\* )/,'')+'</li>').join('')+'</ul>');s=s.split(/\n{2,}/).map(block=>/^<(h\d|ul|pre|blockquote|table|hr)/.test(block)?block:'<p>'+block.replace(/\n/g,'<br>')+'</p>').join('\n');return s;}
const file=new URLSearchParams(location.search).get('file');document.getElementById('file').textContent=file||'';if(!file){content.innerHTML='<p class="err">file 파라미터가 없습니다.</p>'}else fetch(file).then(r=>{if(!r.ok)throw new Error(r.status);return r.text()}).then(t=>content.innerHTML=md(t)).catch(e=>content.innerHTML='<p class="err">파일을 불러오지 못했습니다: '+esc(e.message)+'</p>');
</script></body></html>
